<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background covering 100% of space for maskability -->
  <rect width="512" height="512" fill="#0a0f1d" />
  <!-- Scaled elements within safe area (center 80%) -->
  <g transform="translate(51, 51) scale(0.8)">
    <!-- Dashboard Ring -->
    <circle cx="256" cy="256" r="180" fill="none" stroke="url(#neonGlow)" stroke-width="16" stroke-dasharray="800 300" stroke-linecap="round" filter="url(#glow)" />
    <!-- Speed Needle/Arrow -->
    <path d="M256 120 L290 280 L256 250 L222 280 Z" fill="#39ff14" filter="url(#glow)" />
    <!-- Dynamic Speed Lines -->
    <line x1="160" y1="360" x2="200" y2="330" stroke="#00f2fe" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
    <line x1="352" y1="360" x2="312" y2="330" stroke="#00f2fe" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
  </g>
</svg>
